<form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">

    <div class="form-group">
        <label for="firstName">First Name</label>
        <input id="firstName" type="text" formControlName="firstName" />
        <small *ngIf="
            employeeForm.get('firstName')?.touched &&
            employeeForm.get('firstName')?.hasError('required')
        ">
            First name is required
        </small>
    </div>

    <div class="form-group">
        <label for="lastName">Last Name</label>
        <input id="lastName" type="text" formControlName="lastName" />
        <small *ngIf="
            employeeForm.get('lastName')?.touched &&
            employeeForm.get('lastName')?.hasError('required')
        ">
            Last name is required
        </small>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" />
        <small *ngIf="
            employeeForm.get('email')?.touched &&
            employeeForm.get('email')?.hasError('required')
        ">
            Email is required
        </small>
        <small *ngIf="
            employeeForm.get('email')?.touched &&
            employeeForm.get('email')?.hasError('email')
        ">
            Please enter a valid email
        </small>
    </div>

    <div class="form-group">
        <label for="birthDate">Birth Date</label>
        <input id="birthDate" type="date" formControlName="birthDate" [max]="maxDate" />
        <small *ngIf="
            employeeForm.get('birthDate')?.touched &&
            employeeForm.get('birthDate')?.hasError('required')
        ">
            Birth date is required
        </small>
    </div>

    <div class="form-group">
        <label for="basicSalary">Basic Salary</label>
        <input id="basicSalary" type="text" inputmode="numeric" formControlName="basicSalary"
            (input)="onSalaryInputChecker($event)" />
        <small *ngIf="
            employeeForm.get('basicSalary')?.touched &&
            employeeForm.get('basicSalary')?.hasError('required')
        ">
            Basic salary is required
        </small>
        <small *ngIf="
            employeeForm.get('basicSalary')?.touched &&
            employeeForm.get('basicSalary')?.hasError('pattern')
        ">
            Please enter a valid salary
        </small>
    </div>

    <div class="form-group">
        <label for="group">Group</label>
        <select id="group" formControlName="group">
            <option value="">Select Group</option>
            <option *ngFor="let dep of departments" [value]="dep">
                {{ dep }}
            </option>
        </select>
        <small *ngIf="
            employeeForm.get('group')?.touched &&
            employeeForm.get('group')?.hasError('required')
        ">
            Group is required
        </small>
    </div>

    <div class="button-group">
        <button type="button" (click)="onCancel()">
            Cancel
        </button>
        <button type="submit">
            Save
        </button>
    </div>
</form>
