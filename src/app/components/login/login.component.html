<div class="login-container">
    <!-- Dynamic Mesh Background Grid -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="login-card">
        <div class="card-header">
            <div class="logo-badge">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0 1 10.089 18a11.374 11.374 0 0 1-9.333-2.978m11.333 2.978v-.003c0-1.113-.285-2.16-.786-3.07M9.75 9.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM18.75 9.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>
            </div>
            <h1>Employee Management</h1>
            <p class="subtitle">Secure HR Portal Access</p>
        </div>

        <!-- Error Alert Box -->
        <div *ngIf="errorMessage" class="error-alert">
            <span>⚠️ {{ errorMessage }}</span>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <!-- Username Field -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" formControlName="username" placeholder="Enter username"
                    [class.invalid]="loginForm.get('username')?.touched && loginForm.get('username')?.invalid" />
                <div *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.hasError('required')"
                    class="validation-message">
                    Username is required.
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" formControlName="password" placeholder="••••••••"
                    [class.invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" />
                <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')"
                    class="validation-message">
                    Password is required.
                </div>
            </div>

            <!-- Submit Button with Reactive Spinner -->
            <button type="submit" [disabled]="loginForm.invalid || loading" class="btn-submit">
                <span *ngIf="!loading">Log In</span>
                <span *ngIf="loading" class="spinner"></span>
            </button>
        </form>
    </div>
</div>
