<div class="employee-list-container">
  <div class="toolbar">
    <input type="text" placeholder="Search employee..." [(ngModel)]="searchQuery" (keyup.enter)="onSearch()"
      class="search-box" />
    <select [(ngModel)]="selectedGroup" (change)="onGroupChange(selectedGroup)">
      <option value="">
        All Groups
      </option>
      <option value="Engineering">
        Engineering
      </option>
      <option value="HR">
        HR
      </option>
      <option value="Marketing">
        Marketing
      </option>
      <option value="Sales">
        Sales
      </option>
      <option value="Finance">
        Finance
      </option>
      <option value="Product">
        Product
      </option>
    </select>

    <select [(ngModel)]="selectedStatus" (change)="onStatusChange(selectedStatus)">
      <option value="">
        All Statuses
      </option>

      <option value="Active">
        Active
      </option>

      <option value="On Leave">
        On Leave
      </option>

      <option value="Terminated">
        Terminated
      </option>
    </select>

  </div>

  <div class="status-message" *ngIf="loading$ | async">
    Loading employees...
  </div>

  <div class="status-message error" *ngIf="error$ | async as error">
    {{ error }}
  </div>

  <div class="page-size">

    <label>
      Rows per page:
    </label>

    <select [value]="pageSize" (change)="onPageSizeChange(+$any($event.target).value)">
      <option [value]="5">5</option>
      <option [value]="10">10</option>
      <option [value]="20">20</option>
    </select>

  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th class="sortable">
            Group
          </th>
          <th>Status</th>
          <th class="sortable">
            Salary
          </th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="
            let employee of
            (employees$ | async)
          ">
          <td>
            {{ employee.id }}
          </td>
          <td>
            {{ employee.firstName }}
            {{ employee.lastName }}
          </td>
          <td>
            {{ employee.email }}
          </td>
          <td>
            {{ employee.group }}
          </td>
          <td>
            <span class="status-badge" [ngClass]="{
                active:
                  employee.status === 'Active',
                leave:
                  employee.status === 'On Leave',
                terminated:
                  employee.status === 'Terminated'
              }">
              {{ employee.status }}
            </span>

          </td>
          <td>
            {{ employee.basicSalary | currency:'IDR' }}
          </td>

          <td class="actions">
            <button class="edit-btn">
              Edit
            </button>
            <button class="delete-btn">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="pagination">
    <button (click)="onPageChange(currentPage - 1)" [disabled]="currentPage === 1">
      ◀ Prev
    </button>
    <span>
      Page
      {{ currentPage }}
      of
      {{ totalPages }}
    </span>

    <button (click)="onPageChange(currentPage + 1)" [disabled]="currentPage >= totalPages">
      Next ▶
    </button>
  </div>
</div>
